name: Deploy API

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            whoami
            pwd
            hostname
            which node
            node -v
            which npm
            npm -v
            which pm2
            pm2 list

            cd projects/info-ticker-api

            git status
            git pull

            npm install
            npm run build